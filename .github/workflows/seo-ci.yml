name: SEO CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and SEO validate
        run: npm run build:ci
